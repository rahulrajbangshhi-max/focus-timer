<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Focus Timer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --border: #2a2a2a;
    --text: #e8e8e8;
    --muted: #666;
    --work: #4ade80;
    --short: #60a5fa;
    --long: #c084fc;
    --warn: #facc15;
    --bar-bg: #2a2a2a;
    --font: 'Courier New', Courier, monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
    user-select: none;
  }

  .app { width: 100%; max-width: 480px; }

  /* Header */
  .header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 2.5rem;
  }
  .title { font-size: 1.1rem; letter-spacing: 0.15em; color: var(--muted); }
  .streak-badge {
    font-size: 0.85rem;
    color: var(--warn);
    display: flex;
    align-items: center;
    gap: 4px;
  }

  /* Mode tabs */
  .tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 2.5rem;
  }
  .tab {
    flex: 1;
    padding: 6px 0;
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: var(--font);
    font-size: 0.75rem;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: all 0.15s;
    border-radius: 3px;
  }
  .tab:hover { border-color: #444; color: var(--text); }
  .tab.active-work  { border-color: var(--work);  color: var(--work);  }
  .tab.active-short { border-color: var(--short); color: var(--short); }
  .tab.active-long  { border-color: var(--long);  color: var(--long);  }

  /* Clock */
  .clock-wrap { text-align: center; margin-bottom: 2rem; }
  .clock {
    font-size: clamp(4rem, 14vw, 6rem);
    font-weight: bold;
    letter-spacing: 0.05em;
    line-height: 1;
    transition: color 0.3s;
  }
  .clock.mode-work  { color: var(--work);  }
  .clock.mode-short { color: var(--short); }
  .clock.mode-long  { color: var(--long);  }
  .session-label {
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    color: var(--muted);
    margin-top: 0.6rem;
    text-transform: uppercase;
  }

  /* Progress bar */
  .bar-wrap {
    position: relative;
    height: 4px;
    background: var(--bar-bg);
    border-radius: 2px;
    margin-bottom: 2rem;
    overflow: hidden;
  }
  .bar-fill {
    position: absolute;
    top: 0; left: 0;
    height: 100%;
    border-radius: 2px;
    transition: width 0.5s linear, background 0.3s;
  }
  .bar-fill.mode-work  { background: var(--work);  }
  .bar-fill.mode-short { background: var(--short); }
  .bar-fill.mode-long  { background: var(--long);  }

  /* Controls */
  .controls {
    display: flex;
    gap: 10px;
    margin-bottom: 2.5rem;
  }
  .btn {
    flex: 1;
    padding: 14px;
    background: none;
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font);
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.15s;
  }
  .btn:hover { border-color: #555; background: #1f1f1f; }
  .btn:active { transform: scale(0.98); }
  .btn.primary {
    border-color: #444;
    font-size: 0.9rem;
    font-weight: bold;
  }
  .btn.primary:hover { border-color: #888; }

  /* Stats */
  .stats {
    display: flex;
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 2rem;
  }
  .stat {
    flex: 1;
    padding: 10px 14px;
    background: var(--surface);
    text-align: center;
  }
  .stat-val { font-size: 1.2rem; font-weight: bold; color: var(--text); }
  .stat-key { font-size: 0.65rem; letter-spacing: 0.12em; color: var(--muted); margin-top: 2px; }

  /* Streak dots */
  .streak-dots {
    display: flex;
    gap: 6px;
    justify-content: center;
    margin-bottom: 2rem;
  }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--border);
  }
  .dot.lit { background: var(--warn); }
  .dot.today { background: var(--work); }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 20px;
    border-radius: 3px;
    font-size: 0.8rem;
    letter-spacing: 0.08em;
    opacity: 0;
    pointer-events: none;
    transition: all 0.3s;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Notification dot on title */
  .notify { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--work); margin-left: 4px; vertical-align: middle; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <span class="title">FOCUS TIMER</span>
    <span class="streak-badge" id="streakBadge"></span>
  </div>

  <div class="tabs">
    <button class="tab active-work" data-mode="work"  onclick="selectMode('work')">FOCUS 25</button>
    <button class="tab"             data-mode="short" onclick="selectMode('short')">SHORT 5</button>
    <button class="tab"             data-mode="long"  onclick="selectMode('long')">LONG 15</button>
  </div>

  <div class="clock-wrap">
    <div class="clock mode-work" id="clock">25:00</div>
    <div class="session-label" id="sessionLabel">ready to focus</div>
  </div>

  <div class="bar-wrap">
    <div class="bar-fill mode-work" id="barFill" style="width: 0%"></div>
  </div>

  <div class="controls">
    <button class="btn primary" id="mainBtn" onclick="toggleTimer()">START</button>
    <button class="btn" onclick="resetTimer()">RESET</button>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-val" id="statToday">0</div>
      <div class="stat-key">TODAY</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="statStreak">0</div>
      <div class="stat-key">STREAK</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="statTotal">0</div>
      <div class="stat-key">ALL TIME</div>
    </div>
  </div>

  <div class="streak-dots" id="streakDots"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const MODES = {
  work:  { label: 'FOCUS SESSION',  minutes: 25, cls: 'work'  },
  short: { label: 'SHORT BREAK',    minutes: 5,  cls: 'short' },
  long:  { label: 'LONG BREAK',     minutes: 15, cls: 'long'  },
};

let mode = 'work';
let running = false;
let elapsed = 0;
let interval = null;
let lastTick = null;

function loadData() {
  try { return JSON.parse(localStorage.getItem('focusTimer') || '{}'); } catch { return {}; }
}

function saveData(d) { localStorage.setItem('focusTimer', JSON.stringify(d)); }

function todayStr() { return new Date().toISOString().slice(0, 10); }

function getStats() {
  const d = loadData();
  const today = todayStr();
  const todaySessions = (d.today === today) ? (d.todaySessions || 0) : 0;
  return { streak: d.streak || 0, total: d.total || 0, todaySessions };
}

function recordSession() {
  const d = loadData();
  const today = todayStr();

  if (d.today !== today) {
    d.todaySessions = 0;
    d.today = today;
  }
  d.todaySessions = (d.todaySessions || 0) + 1;
  d.total = (d.total || 0) + 1;

  const last = d.lastDate;
  if (!last) {
    d.streak = 1;
  } else {
    const diff = (new Date(today) - new Date(last)) / 86400000;
    if (diff === 1) d.streak = (d.streak || 0) + 1;
    else if (diff === 0) { /* same day */ }
    else d.streak = 1;
  }
  d.lastDate = today;
  saveData(d);
}

function renderStats() {
  const s = getStats();
  document.getElementById('statToday').textContent  = s.todaySessions;
  document.getElementById('statStreak').textContent = s.streak;
  document.getElementById('statTotal').textContent  = s.total;

  const badge = document.getElementById('streakBadge');
  badge.textContent = s.streak >= 1 ? `🔥 ${s.streak} day${s.streak !== 1 ? 's' : ''}` : '';

  // last 7 days dot row
  const d = loadData();
  const dots = document.getElementById('streakDots');
  dots.innerHTML = '';
  for (let i = 6; i >= 0; i--) {
    const dt = new Date(); dt.setDate(dt.getDate() - i);
    const ds = dt.toISOString().slice(0, 10);
    const el = document.createElement('div');
    el.className = 'dot' + (ds === todayStr() ? ' today' : (ds === d.lastDate && i !== 0 ? ' lit' : ''));
    // simpler: light up if within streak window
    if (d.lastDate) {
      const daysAgo = (new Date(todayStr()) - new Date(ds)) / 86400000;
      if (daysAgo < (d.streak || 0) && daysAgo >= 0) el.className = 'dot lit';
      if (ds === todayStr() && d.today === todayStr() && d.todaySessions > 0) el.className = 'dot today';
    }
    dots.appendChild(el);
  }
}

function selectMode(m) {
  if (running) return;
  mode = m;
  elapsed = 0;
  document.querySelectorAll('.tab').forEach(t => t.className = 'tab');
  document.querySelector(`[data-mode="${m}"]`).className = `tab active-${m}`;
  const cls = MODES[m].cls;
  document.getElementById('clock').className = `clock mode-${cls}`;
  document.getElementById('barFill').className = `bar-fill mode-${cls}`;
  document.getElementById('sessionLabel').textContent = 'ready to ' + (m === 'work' ? 'focus' : 'rest');
  renderClock();
}

function renderClock() {
  const total = MODES[mode].minutes * 60;
  const rem = Math.max(0, total - elapsed);
  const m = Math.floor(rem / 60);
  const s = Math.floor(rem % 60);
  document.getElementById('clock').textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  document.getElementById('barFill').style.width = `${(elapsed / total) * 100}%`;
  document.title = running ? `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')} — Focus Timer` : 'Focus Timer';
}

function toggleTimer() {
  if (running) {
    pauseTimer();
  } else {
    startTimer();
  }
}

function startTimer() {
  running = true;
  lastTick = Date.now();
  document.getElementById('mainBtn').textContent = 'PAUSE';
  document.getElementById('sessionLabel').textContent = MODES[mode].label;
  interval = setInterval(tick, 250);
}

function pauseTimer() {
  running = false;
  clearInterval(interval);
  document.getElementById('mainBtn').textContent = 'RESUME';
  document.getElementById('sessionLabel').textContent = 'paused';
}

function resetTimer() {
  running = false;
  clearInterval(interval);
  elapsed = 0;
  document.getElementById('mainBtn').textContent = 'START';
  document.getElementById('sessionLabel').textContent = 'ready to ' + (mode === 'work' ? 'focus' : 'rest');
  renderClock();
}

function tick() {
  const now = Date.now();
  elapsed += (now - lastTick) / 1000;
  lastTick = now;
  const total = MODES[mode].minutes * 60;

  if (elapsed >= total) {
    elapsed = total;
    renderClock();
    clearInterval(interval);
    running = false;
    onComplete();
    return;
  }
  renderClock();
}

function onComplete() {
  document.getElementById('mainBtn').textContent = 'START';

  if (mode === 'work') {
    recordSession();
    renderStats();
    const s = getStats();
    showToast(`✓ Session done! ${s.streak > 1 ? '🔥 ' + s.streak + '-day streak' : 'Streak started!'}`);
    if (Notification.permission === 'granted') {
      new Notification('Focus session complete!', { body: `${s.streak}-day streak 🔥` });
    }
  } else {
    showToast('Break over — time to focus!');
    if (Notification.permission === 'granted') {
      new Notification('Break over', { body: 'Ready for another focus session?' });
    }
  }

  document.getElementById('sessionLabel').textContent = 'done!';
  Notification.requestPermission();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3500);
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.code === 'Space' && e.target.tagName !== 'BUTTON') { e.preventDefault(); toggleTimer(); }
  if (e.key === 'r' || e.key === 'R') resetTimer();
  if (e.key === '1') selectMode('work');
  if (e.key === '2') selectMode('short');
  if (e.key === '3') selectMode('long');
});

renderClock();
renderStats();
Notification.requestPermission();
</script>
</body>
</html>
